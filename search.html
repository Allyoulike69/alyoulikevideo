<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Allyoulike Video - Gallery Video Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    
    <!-- Main CSS (tanpa header dan footer CSS) -->
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content-wrapper {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }

        /* Banner containers style */
        .banner-container {
            width: 100%;
            text-align: center;
            margin: 10px 0;
        }

        .top-banner, .middle-banner, .bottom-banner {
            min-height: 90px;
            background: transparent;
        }

        /* Social bar container - fixed position bottom right */
        .socialbar-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 300px;
            width: auto;
        }

        .search-container {
            max-width: 600px;
            margin: 30px auto 40px;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            border-radius: 40px;
            padding: 12px 55px 12px 20px;
            font-size: 14px;
            color: white;
            outline: none;
        }

        .search-input:focus { border-color: #ff3b6f; }

        .search-button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #ff3b6f;
            cursor: pointer;
            font-size: 18px;
            padding: 8px 12px;
        }

        .search-button:hover { transform: translateY(-50%) scale(1.1); }

        .search-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 30px;
            border-left: 4px solid #ff3b6f;
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-count { font-size: 14px; color: #aaa; display: flex; align-items: center; gap: 8px; }
        .result-count i { color: #ff3b6f; }

        .clear-search-btn {
            background: #2a2a2a;
            color: #ff3b6f;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .clear-search-btn:hover { background: #ff3b6f; color: #111; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-grid:has(.empty-state) {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 30px;
            max-width: 500px;
            width: 100%;
        }

        .empty-icon { font-size: 80px; margin-bottom: 20px; }
        .empty-icon i { background: linear-gradient(135deg, #ff3b6f, #ff8c5a); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .empty-title {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
        }

        .empty-subtitle {
            font-size: 14px;
            color: #aaa;
        }
        .empty-subtitle span { color: #ff3b6f; font-weight: 600; }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .empty-state { padding: 40px 20px; max-width: 350px; }
            .empty-icon { font-size: 60px; }
            .empty-title { font-size: 20px; }
            .socialbar-wrapper { bottom: 10px; right: 10px; max-width: 250px; }
        }

        .video-item {
            background: #121212;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: transform 0.25s;
        }
        .video-item:hover { transform: translateY(-5px); border-color: #ff3b6f; }

        .thumb-box {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #222;
        }
        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .video-item:hover .thumb-box img { transform: scale(1.05); }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            border: 2px solid rgba(255,255,255,0.5);
        }
        .video-item:hover .play-overlay { background: #ff3b6f; }

        .video-title {
            display: block;
            padding: 12px 12px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            line-height: 1.4;
            color: #eee;
            background: #121212;
            letter-spacing: -0.2px;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .pagination-btn, .pagination-arrow {
            background: #1c1c1c;
            border: 1px solid #333;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .pagination-btn.active { background: #ff3b6f; border-color: #ff3b6f; color: white; }
        .pagination-arrow.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    </style>
    <script src="https://rhubarbambassadorweep.com/8e/52/59/8e52598446ed8e4ff566499581bad509.js"></script>
</head>
<body>

<!-- Header akan di-load dari file terpisah -->
<div id="header-container"></div>

<!-- TOP BANNER -->
<div id="topbanner-container" class="banner-container top-banner"></div>

<div class="content-wrapper">
    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="mainSearchInput" class="search-input" placeholder="Search videos, titles, anime...">
            <button id="mainSearchBtn" class="search-button"><i class="fas fa-search"></i></button>
        </div>
    </div>
    
    <div id="searchInfoBar" class="search-info-bar" style="display: none;">
        <div class="result-count"><i class="fa-regular fa-magnifying-glass"></i><span id="resultCountText"></span></div>
        <button id="clearSearchBtn" class="clear-search-btn"><i class="fa-solid fa-times"></i> Clear Search</button>
    </div>
    
    <!-- MIDDLE BANNER -->
    <div id="middlebanner-container" class="banner-container middle-banner"></div>
    
    <div id="resultGrid" class="video-grid"></div>
    <div id="pagination" class="pagination-container"></div>
</div>

<!-- BOTTOM BANNER -->
<div id="bottombanner-container" class="banner-container bottom-banner"></div>

<!-- Footer akan di-load dari file terpisah -->
<div id="footer-container"></div>

<!-- Social Bar Container - Fixed bottom right -->
<div id="socialbar-wrapper" class="socialbar-wrapper"></div>

<script>
    // Fungsi untuk memuat komponen dari file eksternal
    function loadComponent(containerId, fileUrl, isBanner = false) {
        const container = document.getElementById(containerId);
        if (!container) {
            console.error(`Container ${containerId} tidak ditemukan`);
            return;
        }
        
        fetch(fileUrl + '?t=' + Date.now())
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                container.innerHTML = data;
                console.log(`✅ ${fileUrl} berhasil di-load ke ${containerId}`);
                
                // Eksekusi script yang ada di dalam konten
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                    if (oldScript.parentNode) oldScript.remove();
                });
            })
            .catch(error => {
                console.error(`❌ Error loading ${fileUrl}:`, error);
                if (isBanner) {
                    container.innerHTML = `<div style="text-align:center; padding:20px; color:#ff3b6f; background:#111; border-radius:10px; margin:10px 0;">⚠️ Gagal memuat banner</div>`;
                }
            });
    }

    // Fungsi khusus untuk memuat sosial bar
    function loadSocialBar() {
        const wrapper = document.getElementById('socialbar-wrapper');
        if (!wrapper) {
            console.error('Social bar wrapper tidak ditemukan');
            return;
        }
        
        console.log('Mencoba memuat sosialbar.html...');
        fetch('sosialbar.html?t=' + Date.now())
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                wrapper.innerHTML = data;
                console.log('✅ sosialbar.html berhasil di-load, panjang HTML:', data.length);
                
                // Eksekusi semua script yang ada di sosialbar.html
                const scripts = wrapper.querySelectorAll('script');
                console.log(`Ditemukan ${scripts.length} script di sosialbar.html`);
                scripts.forEach((oldScript, index) => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                        console.log(`Memuat external script ${index + 1}: ${oldScript.src}`);
                    } else {
                        newScript.textContent = oldScript.textContent;
                        console.log(`Memuat inline script ${index + 1}`);
                    }
                    document.body.appendChild(newScript);
                    if (oldScript.parentNode) oldScript.remove();
                });
            })
            .catch(error => {
                console.error('❌ Error loading sosialbar.html:', error);
                wrapper.innerHTML = `<div style="background:#ff3b6f; color:white; padding:10px 18px; border-radius:50px; font-size:13px; font-weight:bold; box-shadow:0 4px 15px rgba(0,0,0,0.3); cursor:pointer;" onclick="this.style.display='none'">
                    <i class="fas fa-share-alt"></i> Social Bar <span style="margin-left:8px;">✕</span>
                </div>`;
            });
    }

    // Load Header
    fetch('search-header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-container').innerHTML = data;
            console.log('✅ Header berhasil di-load');
            // Eksekusi script di header jika ada
            const scripts = document.querySelectorAll('#header-container script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                document.body.appendChild(newScript);
                if (oldScript.parentNode) oldScript.remove();
            });
        })
        .catch(error => {
            console.error('Error loading header:', error);
            document.getElementById('header-container').innerHTML = '<div class="main-header"><div class="top-bar"><div class="logo-area"><div class="logo-text">Allyoulike Video</div></div></div></div>';
        });
    
    // Load Footer
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-container').innerHTML = data;
            console.log('✅ Footer berhasil di-load');
            // Eksekusi script di footer jika ada
            const scripts = document.querySelectorAll('#footer-container script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                document.body.appendChild(newScript);
                if (oldScript.parentNode) oldScript.remove();
            });
        })
        .catch(error => {
            console.error('Error loading footer:', error);
            document.getElementById('footer-container').innerHTML = '<div class="main-footer"><div class="footer-text">© 2025 Allyoulike Video - All rights reserved.</div></div>';
        });

    // Load Top Banner, Middle Banner, Bottom Banner
    loadComponent('topbanner-container', 'topbanner.html', true);
    loadComponent('middlebanner-container', 'middlebanner.html', true);
    loadComponent('bottombanner-container', 'bottombanner.html', true);
    
    // Load Social Bar (diberi delay sedikit agar tidak bentrok)
    setTimeout(() => {
        loadSocialBar();
    }, 300);
</script>

<!-- External JavaScript file -->
<script src="search.js"></script>

</body>
</html>
