<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Allyoulike Video - Gallery Video Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    
    <!-- Main CSS (tanpa header dan footer CSS) -->
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content-wrapper {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }

        .search-container {
            max-width: 600px;
            margin: 30px auto 40px;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            border-radius: 40px;
            padding: 12px 55px 12px 20px;
            font-size: 14px;
            color: white;
            outline: none;
        }

        .search-input:focus { border-color: #ff3b6f; }

        .search-button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #ff3b6f;
            cursor: pointer;
            font-size: 18px;
            padding: 8px 12px;
        }

        .search-button:hover { transform: translateY(-50%) scale(1.1); }

        .search-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 30px;
            border-left: 4px solid #ff3b6f;
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-count { font-size: 14px; color: #aaa; display: flex; align-items: center; gap: 8px; }
        .result-count i { color: #ff3b6f; }

        .clear-search-btn {
            background: #2a2a2a;
            color: #ff3b6f;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .clear-search-btn:hover { background: #ff3b6f; color: #111; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-grid:has(.empty-state) {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 30px;
            max-width: 500px;
            width: 100%;
        }

        .empty-icon { font-size: 80px; margin-bottom: 20px; }
        .empty-icon i { background: linear-gradient(135deg, #ff3b6f, #ff8c5a); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .empty-title {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
        }

        .empty-subtitle {
            font-size: 14px;
            color: #aaa;
        }
        .empty-subtitle span { color: #ff3b6f; font-weight: 600; }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .empty-state { padding: 40px 20px; max-width: 350px; }
            .empty-icon { font-size: 60px; }
            .empty-title { font-size: 20px; }
        }

        .video-item {
            background: #121212;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: transform 0.25s;
        }
        .video-item:hover { transform: translateY(-5px); border-color: #ff3b6f; }

        .thumb-box {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #222;
        }
        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .video-item:hover .thumb-box img { transform: scale(1.05); }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            border: 2px solid rgba(255,255,255,0.5);
        }
        .video-item:hover .play-overlay { background: #ff3b6f; }

        .video-title {
            display: block;
            padding: 12px 12px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            line-height: 1.4;
            color: #eee;
            background: #121212;
            letter-spacing: -0.2px;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .pagination-btn, .pagination-arrow {
            background: #1c1c1c;
            border: 1px solid #333;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .pagination-btn.active { background: #ff3b6f; border-color: #ff3b6f; color: white; }
        .pagination-arrow.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

<!-- Header akan di-load dari file terpisah -->
<div id="header-container"></div>

<div class="content-wrapper">
    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="mainSearchInput" class="search-input" placeholder="Search videos, titles, anime...">
            <button id="mainSearchBtn" class="search-button"><i class="fas fa-search"></i></button>
        </div>
    </div>
    
    <div id="searchInfoBar" class="search-info-bar" style="display: none;">
        <div class="result-count"><i class="fa-regular fa-magnifying-glass"></i><span id="resultCountText"></span></div>
        <button id="clearSearchBtn" class="clear-search-btn"><i class="fa-solid fa-times"></i> Clear Search</button>
    </div>
    
    <div id="resultGrid" class="video-grid"></div>
    <div id="pagination" class="pagination-container"></div>
</div>

<!-- Footer akan di-load dari file terpisah -->
<div id="footer-container"></div>

<!-- Script to load header and footer -->
<script>
    // Load header HTML + CSS dari file terpisah
    fetch('search-header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-container').innerHTML = data;
        })
        .catch(error => {
            console.error('Error loading header:', error);
            document.getElementById('header-container').innerHTML = '<div class="main-header"><div class="top-bar"><div class="logo-area"><div class="logo-text">Allyoulike Video</div></div></div></div>';
        });
    
    // Load footer HTML + CSS dari file terpisah
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-container').innerHTML = data;
        })
        .catch(error => {
            console.error('Error loading footer:', error);
            document.getElementById('footer-container').innerHTML = '<div class="main-footer"><div class="footer-text">© 2025 Allyoulike Video - All rights reserved.</div></div>';
        });
</script>

<!-- External JavaScript file -->
<script src="search.js"></script>

</body>
</html>
