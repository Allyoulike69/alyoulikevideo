<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        .main-header {
            background: #050505;
            border-bottom: 3px solid #ff3b6f;
            border-radius: 0 0 16px 16px;
            padding: 12px 24px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }
        .logo-area:hover {
            transform: scale(1.02);
        }
        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid #ff3b6f;
            background: #1a1a1a;
            transition: border-radius 0.2s, border-color 0.2s;
        }
        .logo-icon:hover {
            border-color: #ff8c5a;
            border-radius: 28px;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff3b6f, #ff8c5a, #ffbc6e);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientFlow 3s ease infinite;
            letter-spacing: -0.5px;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .logo-sub {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        .logo-sub i {
            font-size: 10px;
            margin-right: 5px;
            color: #ff3b6f;
        }

        .desktop-search-wrapper { display: block; }
        .search-panel-desktop {
            display: flex;
            background: #181818;
            border-radius: 60px;
            padding: 6px 18px;
            border: 1px solid #333;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }
        .search-panel-desktop:focus-within {
            border-color: #ff3b6f;
            box-shadow: 0 0 0 1px rgba(255,59,111,0.3);
        }
        .search-panel-desktop input {
            background: transparent;
            border: none;
            padding: 10px;
            color: white;
            outline: none;
            width: 240px;
            font-size: 14px;
        }
        .search-panel-desktop input::placeholder { color: #777; font-weight: 400; }
        .search-panel-desktop button {
            background: transparent;
            border: none;
            color: #ff3b6f;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.1s;
        }
        .search-panel-desktop button:hover { transform: scale(1.1); }
        
        .search-icon-mobile {
            display: none;
            background: #181818;
            border: 1px solid #333;
            border-radius: 50%;
            color: #ff3b6f;
            font-size: 22px;
            cursor: pointer;
            padding: 10px;
            width: 45px;
            height: 45px;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .search-icon-mobile:hover {
            background: #ff3b6f10;
            border-color: #ff3b6f;
        }
        
        .mobile-search-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #0a0a0aef;
            backdrop-filter: blur(12px);
            padding: 20px;
            z-index: 10000;
            border-bottom: 2px solid #ff3b6f;
        }
        .mobile-search-container {
            display: flex;
            align-items: center;
            background: #1e1e1e;
            border-radius: 60px;
            padding: 4px 16px;
            border: 1px solid #444;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            gap: 8px;
        }
        .mobile-search-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 8px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .mobile-search-container button {
            background: transparent;
            border: none;
            color: #ff3b6f;
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
        }
        #closeSearchBtn {
            color: #aaa;
        }
        
        .nav-menu {
            display: flex;
            gap: 28px;
            justify-content: center;
            padding: 18px 0 6px;
            flex-wrap: wrap;
            position: relative;
        }
        .nav-menu a {
            color: #ddd;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-size: 15px;
        }
        .nav-menu a:hover { color: #ff8c5a; transform: translateY(-2px); }
        
        .genre-dropdown {
            position: relative;
            display: inline-block;
        }
        .genre-btn {
            color: #ddd;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-size: 15px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }
        .genre-btn:hover {
            color: #ff8c5a;
            transform: translateY(-2px);
        }
        .genre-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #1a1a1a;
            min-width: 160px;
            max-height: 400px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 100;
            margin-top: 8px;
        }
        .genre-dropdown-content.show {
            display: block;
        }
        .genre-dropdown-content a {
            color: #ddd;
            padding: 10px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
        }
        .genre-dropdown-content a:hover {
            background: #ff3b6f;
            color: white;
        }

        @media (max-width: 768px) {
            .search-icon-mobile { display: flex !important; align-items: center; justify-content: center; }
            .desktop-search-wrapper { display: none !important; }
            .logo-icon { width: 44px; height: 44px; }
            .logo-text { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="main-header">
    <div class="top-bar">

            <img src="https://i.ibb.co.com/11BD9mL/38ce5f186788fbab817dc04d9ccc14e4.jpg"
                 alt="Allyoulike Video Logo"

                 onerror="this.onerror=null; this.src='https://placehold.co/80x80?text=AV'">
            <div>
                <div class="logo-text">Allyoulike Video</div>
                <div class="logo-sub"><i class="fa-regular fa-circle-play"></i> Gallery Video Center</div>
            </div>
        </div>
        
        <button class="search-icon-mobile" id="searchIconMobile">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        
        <div class="desktop-search-wrapper">

                <button id="searchBtnDesktop"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </div>
    
    <div class="nav-menu">
        <a href="#" id="navHome"><i class="fa-solid fa-house"></i> Home</a>
        <a href="#" id="navRandom"><i class="fa-solid fa-shuffle"></i> Random Video</a>
        
        <div class="genre-dropdown">
            <button class="genre-btn" id="navGenre">
                <i class="fa-solid fa-tag"></i> Genre <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i>
            </button>
            <div class="genre-dropdown-content" id="genreDropdown">

                <a href="#" data-genre="Censored">Censored</a>
                <a href="#" data-genre="Comedy">Comedy</a>
                <a href="#" data-genre="Domination">Domination</a>
                <a href="#" data-genre="Futanari">Futanari</a>
                <a href="#" data-genre="Harem">Harem</a>
                <a href="#" data-genre="Incest">Incest</a>
                <a href="#" data-genre="Maid">Maid</a>
                <a href="#" data-genre="Monsters">Monsters</a>
                <a href="#" data-genre="Nurse">Nurse</a>
                <a href="#" data-genre="Romance">Romance</a>
                <a href="#" data-genre="School">School</a>
                <a href="#" data-genre="Shotacon">Shotacon</a>
                <a href="#" data-genre="Small Tits">Small Tits</a>
                <a href="#" data-genre="Tentacles">Tentacles</a>
                <a href="#" data-genre="Uncensored">Uncensored</a>
                <a href="#" data-genre="Yaoi">Yaoi</a>
                <a href="#" data-genre="Yuri">Yuri</a>
            </div>
        </div>
        
        <a href="#" id="navComic"><i class="fa-solid fa-book-open"></i> Comic</a>
        <a href="#" id="navVideo34"><i class="fa-solid fa-video"></i> Video 34</a>
    </div>
</div>

<div class="mobile-search-overlay" id="mobileSearchOverlay">
    <div class="mobile-search-container">
        <input type="text" id="searchInputMobile" placeholder="Search videos, titles..." autocomplete="off">
        <button id="searchBtnMobile"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button id="closeSearchBtn"><i class="fa-solid fa-times"></i></button>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
