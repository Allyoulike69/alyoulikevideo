<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
    /* ========== HEADER STYLES ========== */
    .main-header {
        background: #050505;
        border-bottom: 3px solid #ff3b6f;
        border-radius: 0 0 16px 16px;
        padding: 12px 24px;
        width: 100%;
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        flex-shrink: 0;
        transition: transform 0.2s ease;
    }

    .logo-area:hover {
        transform: scale(1.02);
    }

    .logo-icon {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        object-fit: cover;
        border: 2px solid #ff3b6f;
        background: #1a1a1a;
        transition: border-radius 0.2s, border-color 0.2s;
    }

    .logo-icon:hover {
        border-color: #ff8c5a;
        border-radius: 28px;
    }

    .logo-text {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(135deg, #ff3b6f, #ff8c5a, #ffbc6e);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: gradientFlow 3s ease infinite;
        letter-spacing: -0.5px;
    }

    @keyframes gradientFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .logo-sub {
        font-size: 11px;
        color: #aaa;
        margin-top: 4px;
        letter-spacing: 0.5px;
    }

    .logo-sub i {
        font-size: 10px;
        margin-right: 5px;
        color: #ff3b6f;
    }

    .nav-menu {
        display: flex;
        gap: 28px;
        justify-content: center;
        padding: 18px 0 6px;
        flex-wrap: wrap;
        position: relative;
    }

    .nav-menu a {
        color: #ddd;
        text-decoration: none;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s;
        font-size: 15px;
    }

    .nav-menu a:hover { 
        color: #ff8c5a; 
        transform: translateY(-2px); 
    }

    .genre-dropdown {
        position: relative;
        display: inline-block;
    }

    .genre-btn {
        color: #ddd;
        text-decoration: none;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s;
        font-size: 15px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
    }

    .genre-btn:hover {
        color: #ff8c5a;
        transform: translateY(-2px);
    }

    .genre-dropdown-content {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        background: #1a1a1a;
        min-width: 160px;
        max-height: 400px;
        overflow-y: auto;
        border-radius: 12px;
        border: 1px solid #333;
        box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        z-index: 100;
        margin-top: 8px;
    }

    .genre-dropdown-content.show {
        display: block;
    }

    .genre-dropdown-content a {
        color: #ddd;
        padding: 10px 16px;
        text-decoration: none;
        display: block;
        font-size: 13px;
    }

    .genre-dropdown-content a:hover {
        background: #ff3b6f;
        color: white;
    }

    /* Responsive Header */
    @media (max-width: 768px) {
        .logo-icon { width: 44px; height: 44px; }
        .logo-text { font-size: 22px; }
    }
</style>

<div class="main-header">
